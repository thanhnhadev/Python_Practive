<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snippet</title>
    <style>
        .box-1{
            width: 100px;
            height: 100px;
            border: 5px solid violet;
            background-color: green;
        }
        .box-2{
            width: 100px;
            height: 100px;
            padding-top: 20px;
            margin-top: 50px;
            margin-left: 100px;
            background-color: red;
        }
        .box-3{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-top: 50px;
            margin-left: 100px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="box-1">
        
    </div>
    <div class="box-2">

    </div>
    <div class="box-3">

    </div>
</body>
</html>
