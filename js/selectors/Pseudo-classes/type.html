<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>type selectors</title>
    <link rel="stylesheet" href="./assest/reset.css">
    <link rel="stylesheet" href="./assest/type.css">
</head>
<body>
    <h1>Pseudo Classes</h1>
    <ul>
        <li>
            <p>:first-of-type</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:last-of-type</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:nth-of-type(n)</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:nth-last-of-type(n)</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:only-of-type</p>
            <input type="checkbox">
        </li>
    </ul>
</body>
</html>
