<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>type selectors</title>
    <link rel="stylesheet" href="./assest/reset.css">
    <link rel="stylesheet" href="./assest/type.css">
</head>
<body>
    <h1>Pseudo Classes</h1>
    <h1 class="highlight">Heading 1</h1>
    <p class="highlight">Text</p>
    <a href="" class="highlight">link</a>
    <div>
        <p class="text">Text 1</p>
        <p class="text">Text 2</p>
        <p class="text">Text 3</p>
        <p class="text">Text 4</p>
        <p class="text">Text 5</p>
        <p class="text">Text 6</p>
        <p class="text">Text 7</p>
        <p class="text">Text 8</p>
        <p class="text">Text 9</p>
        <p class="text">Text 10</p>
    </div>
    <ul>
        <li>
            <p>:first-of-type</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:last-of-type</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:nth-of-type(n)</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:nth-last-of-type(n)</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:only-of-type</p>
            <input type="checkbox">
        </li>
        <li>
            <p>:not(selector)</p>
            <input type="checkbox">
        </li>
    </ul>
</body>
</html>
